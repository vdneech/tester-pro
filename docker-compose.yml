services:
  web:
    build: .
    container_name: django
    restart: always
    volumes:
      - static:/app/tester/static
      - media:/app/tester/media
    env_file:
      - .env
    expose:
      - "8000"

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/app/tester/static:ro
      - media:/app/tester/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - web

volumes:
  static:
  media:
