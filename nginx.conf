upstream django_app {
    server web:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name test-kabinet.ru;
    client_max_body_size 2M;


    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

 server {
     listen 443 ssl http2;
     listen [::]:443 ssl http2;
     server_name test-kabinet.ru;

     client_max_body_size 2M;
     ssl_certificate /etc/letsencrypt/live/portfolio-kgtk.online/fullchain.pem;
     ssl_certificate_key /etc/letsencrypt/live/portfolio-kgtk.online/privkey.pem;

     ssl_protocols TLSv1.2 TLSv1.3;
     ssl_prefer_server_ciphers on;
     ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
     ssl_session_cache shared:SSL:10m;
     ssl_session_tickets off;

     gzip on;
     gzip_types text/plain text/css application/json application/javascript text/xml;
     gzip_min_length 1000;

     location /static/ {
         alias /app/tester/staticfiles/;
         expires 30d;
     }

     location /media/ {
         alias /app/tester/media/;
         expires 7d;
     }
#
     location / {
         proxy_pass http://django;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-Proto $scheme;
         proxy_set_header X-Forwarded-SSL on;
         proxy_redirect off;
     }
 }
